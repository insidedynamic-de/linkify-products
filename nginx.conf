server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy API to the backend container (docker-compose service name "backend")
    location /api {
        proxy_pass http://backend:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # Hashed static assets (Vite emits content-hashed filenames) — safe to cache
    # forever. MUST come before the SPA fallback so these never get no-cache.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing — serve index.html for all non-file routes.
    # index.html itself must NOT be cached: it references the hashed bundles, so a
    # stale index pins the browser to old JS/CSS until a hard reload. no-store
    # makes every load fetch a fresh index (which then pulls fresh hashed assets).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, must-revalidate" always;
        expires off;
    }

    # Disable access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}
